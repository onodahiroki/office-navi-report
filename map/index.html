<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>撮影ステータスMAP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Arial',sans-serif;background:#f5f7fa;}
#header{background:linear-gradient(135deg,#1F3864,#2F5496);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:16px;}
#header h1{font-size:1.15rem;font-weight:700;}
#header .subtitle{font-size:0.8rem;opacity:.8;}
#controls{background:#fff;padding:10px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #e0e0e0;}
#controls label{font-size:.85rem;font-weight:600;color:#333;}
#controls select{padding:5px 10px;border:1px solid #ccc;border-radius:6px;font-size:.85rem;}
#legend{background:#fff;padding:8px 16px;display:flex;gap:20px;align-items:center;border-bottom:1px solid #e0e0e0;font-size:.82rem;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:6px;}
.leg-dot{width:13px;height:13px;border-radius:50%;border:2px solid rgba(0,0,0,.2);}
#map{height:calc(100vh - 145px);}
#info-panel{position:absolute;top:170px;right:12px;z-index:1000;background:#fff;border-radius:10px;box-shadow:0 4px 18px rgba(0,0,0,.15);padding:14px;min-width:220px;max-width:280px;display:none;}
#info-panel h3{font-size:.95rem;color:#1F3864;margin-bottom:8px;}
#info-panel .row{display:flex;justify-content:space-between;font-size:.82rem;padding:3px 0;border-bottom:1px solid #f0f0f0;}
#info-panel .row:last-child{border:none;}
#info-panel .label{color:#666;}
#info-panel .val{font-weight:600;color:#333;}
.badge-A{background:#C6EFCE;color:#276749;padding:2px 8px;border-radius:10px;font-size:.78rem;font-weight:700;}
.badge-B{background:#FFEB9C;color:#744210;padding:2px 8px;border-radius:10px;font-size:.78rem;font-weight:700;}
.badge-C{background:#FFC7CE;color:#742A2A;padding:2px 8px;border-radius:10px;font-size:.78rem;font-weight:700;}
.badge-D{background:#E8D5F5;color:#553C6E;padding:2px 8px;border-radius:10px;font-size:.78rem;font-weight:700;}
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="subtitle">物件再撮影プロジェクト</div>
    <h1>撮影ステータス MAP</h1>
  </div>
  <div style="margin-left:auto;display:flex;gap:16px;font-size:.85rem;" id="summary-counts"></div>
</div>
<div id="controls">
  <label>エリア：</label>
  <select id="areaFilter" onchange="applyFilter()">
    <option value="">全エリア</option>
    <option>大阪市北区</option>
    <option>大阪市中央区</option>
    <option>淀川区</option>
    <option>江坂・千里中央</option>
  </select>
  <label>ステータス：</label>
  <select id="statusFilter" onchange="applyFilter()">
    <option value="">全ステータス</option>
    <option value="A">A：完了</option>
    <option value="B">B：外観のみ</option>
    <option value="C">C：未対応</option>
    <option value="D">D：撮影許可必要</option>
  </select>
</div>
<div id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#4CAF50;"></div><span>A：完了（一旦完了・定期確認必要）</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:#FF9800;"></div><span>B：外観のみ撮影済み</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:#F44336;"></div><span>C：未対応</span></div>
  <div class="leg-item"><div class="leg-dot" style="background:#9C27B0;"></div><span>D：撮影許可必要</span></div>
</div>
<div id="map"></div>
<div id="info-panel">
  <button onclick="document.getElementById('info-panel').style.display='none'" style="float:right;border:none;background:none;font-size:1.1rem;cursor:pointer;">✕</button>
  <h3 id="ip-name"></h3>
  <div class="row"><span class="label">エリア</span><span class="val" id="ip-area"></span></div>
  <div class="row"><span class="label">ステータス</span><span class="val" id="ip-status"></span></div>
  <div class="row"><span class="label">住所</span><span class="val" id="ip-address" style="font-size:.78rem;"></span></div>
  <div class="row"><span class="label">確認日</span><span class="val" id="ip-date"></span></div>
  <div style="margin-top:8px;"><a id="ip-url" href="#" target="_blank" style="color:#0563C1;font-size:.82rem;">詳細ページを開く →</a></div>
</div>

const STATUS_COLOR = {A:'#4CAF50', B:'#FF9800', C:'#F44336', D:'#9C27B0'};
const STATUS_LABEL = {A:'A：完了', B:'B：外観のみ', C:'C：未対応', D:'D：撮影許可必要'};

const map = L.map('map').setView([34.7024, 135.5050], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap contributors', maxZoom:19
}).addTo(map);

let markers = [];

function createMarker(b) {
  const color = STATUS_COLOR[b.status] || '#999';
  const icon = L.divIcon({
    className:'',
    html:`<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid rgba(0,0,0,0.3);box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>`,
    iconSize:[12,12], iconAnchor:[6,6]
  });
  const m = L.marker([b.lat, b.lng], {icon});
  m.on('click', ()=>showInfo(b));
  return m;
}

function showInfo(b) {
  document.getElementById('ip-name').textContent = b.name;
  document.getElementById('ip-area').textContent = b.area;
  document.getElementById('ip-status').innerHTML = `<span class="badge-${b.status}">${STATUS_LABEL[b.status]||b.status}</span>`;
  document.getElementById('ip-address').textContent = b.address || '—';
  document.getElementById('ip-date').textContent = b.date || '—';
  const urlEl = document.getElementById('ip-url');
  if(b.url){urlEl.href=b.url;urlEl.style.display='';}
  else urlEl.style.display='none';
  document.getElementById('info-panel').style.display = 'block';
}

function applyFilter() {
  const area = document.getElementById('areaFilter').value;
  const status = document.getElementById('statusFilter').value;
  markers.forEach(m => m.remove());
  markers = [];
  const filtered = DATA.filter(b =>
    (!area || b.area === area) &&
    (!status || b.status === status)
  );
  filtered.forEach(b => {
    const m = createMarker(b);
    m.addTo(map);
    markers.push(m);
  });
  updateSummary(filtered);
}

function updateSummary(data) {
  const cnt = {A:0,B:0,C:0,D:0};
  data.forEach(b=>{ if(b.status in cnt) cnt[b.status]++; });
  document.getElementById('summary-counts').innerHTML =
    `<span style="color:#A5D6A7;font-weight:700;">A: ${cnt.A}棟</span>` +
    `<span style="color:#FFE082;font-weight:700;">B: ${cnt.B}棟</span>` +
    `<span style="color:#EF9A9A;font-weight:700;">C: ${cnt.C}棟</span>` +
    `<span style="color:#CE93D8;font-weight:700;">D: ${cnt.D}棟</span>`;
}

applyFilter();
</script>
