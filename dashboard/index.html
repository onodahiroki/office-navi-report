<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>画像強化ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Arial',sans-serif;background:#f0f4f8;color:#333;}
#header{background:linear-gradient(135deg,#1F3864,#2F5496);color:#fff;padding:16px 24px;}
#header h1{font-size:1.3rem;font-weight:700;}
#header .sub{font-size:.82rem;opacity:.8;margin-top:2px;}
.main{padding:20px;max-width:1300px;margin:0 auto;}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px;}
.kpi-card{background:#fff;border-radius:10px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.07);border-top:4px solid #2F5496;}
.kpi-card.card-a{border-top-color:#4CAF50;}
.kpi-card.card-b{border-top-color:#FF9800;}
.kpi-card.card-c{border-top-color:#F44336;}
.kpi-card.card-d{border-top-color:#9C27B0;}
.kpi-label{font-size:.78rem;color:#666;margin-bottom:6px;}
.kpi-value{font-size:2rem;font-weight:700;color:#1F3864;}
.kpi-sub{font-size:.75rem;color:#888;margin-top:4px;}
.filter-bar{background:#fff;border-radius:10px;padding:14px 20px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:20px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.filter-bar label{font-size:.83rem;font-weight:600;color:#333;white-space:nowrap;}
.filter-bar select{padding:6px 12px;border:1px solid #ccc;border-radius:6px;font-size:.83rem;min-width:140px;}
.filter-bar button{padding:6px 16px;background:#2F5496;color:#fff;border:none;border-radius:6px;font-size:.83rem;cursor:pointer;}
.content-grid{display:flex;flex-direction:column;gap:18px;margin-bottom:20px;}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);overflow:hidden;}
.card-header{background:#1F3864;color:#fff;padding:12px 16px;font-size:.9rem;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.card-header span{font-size:.78rem;opacity:.8;font-weight:400;}
table{width:100%;border-collapse:collapse;font-size:.82rem;}
thead th{background:#2F5496;color:#fff;padding:8px 10px;text-align:left;position:sticky;top:0;}
tbody tr:nth-child(even){background:#f7fafc;}
tbody tr:hover{background:#e8f0fe;}
td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:middle;}
.badge{padding:2px 9px;border-radius:10px;font-size:.75rem;font-weight:700;white-space:nowrap;}
.badge-A{background:#C6EFCE;color:#276749;}
.badge-B{background:#FFEB9C;color:#744210;}
.badge-C{background:#FFC7CE;color:#742A2A;}
.badge-D{background:#E8D5F5;color:#553C6E;}
.table-scroll{max-height:520px;overflow-y:auto;}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.chart-wrap{padding:16px;}
canvas{max-height:280px;}
a.link{color:#0563C1;font-size:.8rem;text-decoration:none;}
a.link:hover{text-decoration:underline;}
</style>
</head>
<body>
<div id="header">
  <h1>📸 画像強化ダッシュボード</h1>
  <div class="sub">物件再撮影プロジェクト　2026年7月</div>
</div>
<div class="main">
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">対象ビル数</div>
      <div class="kpi-value" id="kpi-total">263</div>
      <div class="kpi-sub">現状のままでOK除く</div>
    </div>
    <div class="kpi-card card-a">
      <div class="kpi-label">A：完了</div>
      <div class="kpi-value" style="color:#276749;" id="kpi-a">66</div>
      <div class="kpi-sub">一旦完了（定期確認必要）</div>
    </div>
    <div class="kpi-card card-b">
      <div class="kpi-label">B：外観のみ</div>
      <div class="kpi-value" style="color:#744210;" id="kpi-b">60</div>
      <div class="kpi-sub">共用部・動画が必要</div>
    </div>
    <div class="kpi-card card-c">
      <div class="kpi-label">C：未対応</div>
      <div class="kpi-value" style="color:#742A2A;" id="kpi-c">131</div>
      <div class="kpi-sub">まだ撮影されていない</div>
    </div>
    <div class="kpi-card card-d">
      <div class="kpi-label">D：撮影許可必要（外観のみ撮影済）</div>
      <div class="kpi-value" style="color:#553C6E;" id="kpi-d">6</div>
      <div class="kpi-sub">自分だけでは難しい</div>
    </div>
  </div>

  <div class="filter-bar">
    <label>エリア：</label>
    <select id="areaFilter" onchange="renderTable()">
      <option value="">全エリア</option>
      <option>大阪市北区</option>
      <option>大阪市中央区</option>
      <option>淀川区</option>
      <option>江坂・千里中央</option>
    </select>
    <label>ステータス：</label>
    <select id="statusFilter" onchange="renderTable()">
      <option value="">全ステータス</option>
      <option value="A">A：完了</option>
      <option value="B">B：外観のみ</option>
      <option value="C">C：未対応</option>
      <option value="D">D：撮影許可必要（外観のみ撮影済）</option>
    </select>
    <label>反映月：</label>
    <select id="monthFilter" onchange="renderTable()">
      <option value="">すべて</option>
      <option value="2026-01">2026年1月</option>
      <option value="2026-02">2026年2月</option>
      <option value="2026-03">2026年3月</option>
      <option value="2026-04">2026年4月</option>
      <option value="2026-05">2026年5月</option>
      <option value="2026-06">2026年6月</option>
    </select>
    <label>ビル名検索：</label>
    <input type="text" id="searchInput" placeholder="ビル名を入力..." oninput="renderTable()"
      style="padding:6px 12px;border:1px solid #ccc;border-radius:6px;font-size:.83rem;min-width:180px;">
  </div>

  <div class="content-grid">
    <div class="card">
      <div class="card-header">
        ビル一覧
        <span id="table-count"></span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>ビル名</th>
              <th>エリア</th>
              <th>ステータス</th>
              <th>確認日</th>
              <th>URL</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
    <div class="chart-row">
      <div class="card">
        <div class="card-header">ステータス分布</div>
        <div class="chart-wrap">
          <canvas id="statusChart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-header">エリア別進捗</div>
        <div class="chart-wrap">
          <canvas id="areaChart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

function renderTable() {

}
