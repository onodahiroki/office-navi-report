<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハイグレードオフィスビル 比較ダッシュボード｜オフィスナビ</title>
<style>
:root {
  --bg-main: #0f172a;
  --bg-card: #1e293b;
  --bg-card2: rgba(30,41,59,0.85);
  --accent: #ec4899;
  --accent2: #ff8db1;
  --navy: #1e3a8a;
  --blue: #3b82f6;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --border: rgba(255,255,255,0.1);
  --border-accent: rgba(236,72,153,0.3);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Sans','Meiryo',sans-serif;
  background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
  color: var(--text); min-height: 100vh;
}

/* HEADER */
header {
  background: rgba(15,23,42,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.header-title { font-size: 1.1rem; font-weight: 700; }
.header-title span { 
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-badge {
  background: rgba(236,72,153,0.15);
  border: 1px solid var(--border-accent);
  border-radius: 20px; padding: 4px 14px;
  font-size: 0.78rem; font-weight: 600; color: var(--accent2);
}

/* CONTROLS */
.controls {
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
}
.control-group { display: flex; align-items: center; gap: 6px; }
.control-group label { font-size: 0.78rem; color: var(--accent2); white-space: nowrap; font-weight: 600; }
.controls input[type=text] {
  padding: 7px 12px; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; font-size: 0.85rem;
  background: rgba(15,23,42,0.7); color: var(--text); width: 200px;
}
.controls input[type=text]:focus { outline: none; border-color: var(--accent); }
.controls select {
  padding: 7px 10px; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; font-size: 0.85rem;
  background: rgba(15,23,42,0.7); color: var(--text);
}
.btn { padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 600; }
.btn-reset { background: rgba(255,255,255,0.08); color: var(--text-muted); }
.btn-reset:hover { background: rgba(255,255,255,0.15); }
.btn-compare {
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: #fff; margin-left: auto;
}
.btn-compare:disabled { background: rgba(255,255,255,0.1); color: var(--text-muted); cursor: default; }
.result-count { font-size: 0.82rem; color: var(--text-muted); }

/* GRID */
.grid-wrap { max-width: 1280px; margin: 0 auto; padding: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }

/* CARD */
.card {
  background: var(--bg-card2);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  display: flex; flex-direction: column;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(236,72,153,0.15);
  border-color: var(--border-accent);
}
.card.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(236,72,153,0.25);
}

/* CARD HEADER */
.card-header {
  padding: 14px 16px 10px;
  background: rgba(15,23,42,0.4);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px;
}
.card-header-info { flex: 1; }
.area-badges { display: flex; gap: 6px; margin-bottom: 6px; }
.badge-area1 {
  background: rgba(236,72,153,0.2); color: var(--accent2);
  border: 1px solid rgba(236,72,153,0.3);
  padding: 2px 9px; border-radius: 10px; font-size: 0.7rem; font-weight: 700;
}
.badge-area2 {
  background: rgba(59,130,246,0.15); color: #93c5fd;
  border: 1px solid rgba(59,130,246,0.25);
  padding: 2px 9px; border-radius: 10px; font-size: 0.7rem; font-weight: 700;
}
.card-name { font-size: 0.97rem; font-weight: 700; color: var(--text); line-height: 1.3; }
.card-name-en { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
.checkbox-compare { width: 17px; height: 17px; cursor: pointer; accent-color: var(--accent); margin-top: 4px; flex-shrink: 0; }

/* CARD BODY */
.card-body { padding: 14px 16px; flex: 1; }
.card-desc { font-size: 0.82rem; color: #cbd5e1; line-height: 1.55; margin-bottom: 10px; }

.station-row {
  display: flex; align-items: flex-start; gap: 5px;
  font-size: 0.78rem; color: #94a3b8; margin-bottom: 10px;
}

.spec-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px; margin-bottom: 10px;
}
.spec-item {
  background: rgba(15,23,42,0.5);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px; padding: 7px 10px;
}
.spec-label { font-size: 0.65rem; color: var(--accent2); margin-bottom: 3px; font-weight: 600; }
.spec-value { font-size: 0.84rem; font-weight: 700; color: var(--text); }

.struct-badge {
  display: inline-block;
  padding: 2px 8px; border-radius: 8px; font-size: 0.72rem; font-weight: 700;
}
.struct-免震 { background: rgba(34,197,94,0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
.struct-制振 { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.2); }
.struct-耐震 { background: rgba(234,179,8,0.15); color: #fde047; border: 1px solid rgba(234,179,8,0.2); }

.tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.tag {
  background: rgba(255,255,255,0.07);
  color: #94a3b8;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 2px 9px; border-radius: 20px; font-size: 0.7rem;
}

/* NAVI SCORE */
.score-section { margin-bottom: 4px; }
.score-label { font-size: 0.7rem; color: var(--accent2); margin-bottom: 6px; font-weight: 600; }
.scores { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; }
.score-item { text-align: center; }
.score-name { font-size: 0.6rem; color: var(--text-muted); margin-bottom: 3px; }
.score-dots { display: flex; justify-content: center; gap: 2px; }
.dot { width: 7px; height: 7px; border-radius: 50%; }
.dot.filled { background: var(--accent); }
.dot.empty { background: rgba(255,255,255,0.12); }
.score-num { font-size: 0.74rem; font-weight: 700; color: var(--text); margin-top: 2px; }

/* CARD FOOTER */
.card-footer {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.publish-date {
  font-size: 0.72rem; color: var(--text-muted);
  display: flex; align-items: center; gap: 4px;
}
.link-article {
  margin-left: auto;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: #fff;
  padding: 7px 16px; border-radius: 8px;
  font-size: 0.78rem; font-weight: 700;
  text-decoration: none; white-space: nowrap;
  transition: opacity .15s;
}
.link-article:hover { opacity: 0.85; }

/* COMPARE MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  z-index: 100; overflow-y: auto; padding: 20px;
}
.modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; }
.modal {
  background: #1e293b;
  border: 1px solid var(--border);
  border-radius: 16px;
  max-width: 1200px; width: 100%; margin: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
}
.modal-header {
  background: rgba(15,23,42,0.8);
  color: #fff;
  padding: 16px 24px;
  border-radius: 16px 16px 0 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h2 { font-size: 1rem; }
.modal-close {
  background: rgba(255,255,255,0.1); border: none;
  color: #fff; width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: rgba(236,72,153,0.3); }
.modal-body { overflow-x: auto; padding: 20px; }
.compare-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
.compare-table th {
  background: rgba(15,23,42,0.8); color: var(--text);
  padding: 10px 12px; text-align: center; white-space: nowrap;
  border-bottom: 2px solid var(--border-accent);
}
.compare-table td {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  vertical-align: top; color: var(--text);
}
.compare-table tr:nth-child(even) td { background: rgba(15,23,42,0.3); }
.compare-table td:first-child { font-weight: 600; color: var(--text-muted); white-space: nowrap; width: 100px; }

/* EMPTY */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
</style>
</head>

<header>
  <div>
    <div class="header-title">🏢 ハイグレードオフィスビル <span>比較ダッシュボード</span>｜オフィスナビ</div>
    <div style="font-size:.75rem;color:var(--text-muted);margin-top:3px;">公開済み記事 10棟を統合した動的比較ビュー</div>
  </div>
  <div class="header-badge" id="totalBadge">10棟掲載中</div>
</header>

<div class="controls">
  <div class="control-group">
    <label>🔍 検索</label>
    <input type="text" id="searchInput" placeholder="ビル名・エリアで検索...">
  </div>
  <div class="control-group">
    <label>📍 エリア</label>
    <select id="areaFilter">
      <option value="">すべて</option>
      <option value="東京">東京</option>
      <option value="大阪">大阪</option>
    </select>
  </div>
  <div class="control-group">
    <label>🏗️ 構造</label>
    <select id="structFilter">
      <option value="">すべて</option>
      <option value="制振">制振</option>
      <option value="制震">制震</option>
      <option value="免震">免震</option>
      <option value="耐震">耐震</option>
      <option value="新耐震">新耐震</option>
    </select>
  </div>
  <div class="control-group">
    <label>📅 反映月</label>
    <select id="publishFilter">
      <option value="">すべて</option>
      <option value="2026/4">2026年4月</option>
      <option value="2026/5">2026年5月</option>
      <option value="2026/6">2026年6月</option>
      <option value="2026/7">2026年7月</option>
    </select>
  </div>
  <div class="control-group">
    <label>⇅ ソート</label>
    <select id="sortSelect">
      <option value="default">標準順（公開日）</option>
      <option value="floor-desc">基準階（坪）大きい順</option>
      <option value="floors-desc">階数 多い順</option>
      <option value="completion-desc">竣工 新しい順</option>
      <option value="score-desc">Naviスコア合計 高い順</option>
    </select>
  </div>
  <span class="result-count" id="resultCount"></span>
  <button class="btn btn-compare" id="compareBtn" onclick="openCompare()" disabled>
    ✓ 選択した棟を比較（<span id="selectedCount">0</span>）
  </button>
  <button class="btn btn-reset" onclick="resetFilters()">条件リセット</button>
</div>

<div class="grid-wrap">
  <div class="grid" id="cardGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="emoji">🔍</div>
    <div>条件に一致するビルが見つかりません</div>
  </div>
</div>

<!-- COMPARE MODAL -->
<div class="modal-overlay" id="compareModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📊 ビル比較ビュー</h2>
      <button class="modal-close" onclick="closeCompare()">✕</button>
    </div>
    <div class="modal-body">
      <table class="compare-table" id="compareTable"></table>
    </div>
  </div>
</div>

  return Array.from({length:5},(_,i)=>`<div class="dot ${i<score?'filled':'empty'}"></div>`).join('');
}
function scoreTotal(b) { return Object.values(b.scores).reduce((a,v)=>a+v,0); }
function floorNum(b) {
  const m = String(b.standardFloor).match(/[\d,]+/);
  return m ? parseInt(m[0].replace(',','')) : 0;
}
function parseYear(b) {
  const m = String(b.completion).match(/(\d{4})/);
  return m ? parseInt(m[1]) : 0;
}

function makeCard(b) {
  const isSelected = selected.has(b.id);
  return `<div class="card ${isSelected?'selected':''}" id="card-${b.id}">
    <div class="card-header">
      <div class="card-header-info">
        <div class="area-badges">
          <span class="badge-area1">${b.area1}</span>
          <span class="badge-area2">${b.area2}</span>
        </div>
        <div class="card-name">${b.name}</div>
        <div class="card-name-en">${b.nameEn}</div>
      </div>
      <input type="checkbox" class="checkbox-compare" ${isSelected?'checked':''} onchange="toggleSelect(${b.id},this)" title="比較に追加">
    </div>
    <div class="card-body">
      <p class="card-desc">${b.description}</p>
      <div class="station-row"><span>🚇</span><span>${b.station}</span></div>
      <div class="spec-grid">
        <div class="spec-item"><div class="spec-label">🏢 階数</div><div class="spec-value">${b.floors}階</div></div>
        <div class="spec-item"><div class="spec-label">📐 基準階</div><div class="spec-value">${b.standardFloor}</div></div>
        <div class="spec-item"><div class="spec-label">🏗️ 構造</div><div class="spec-value"><span class="struct-badge struct-${b.structure}">${b.structure}</span></div></div>
        <div class="spec-item"><div class="spec-label">📅 竣工</div><div class="spec-value">${b.completion}</div></div>
      </div>
      <div class="tags">${b.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div class="score-section">
        <div class="score-label">📊 Naviスコア</div>
        <div class="scores">
          ${Object.entries(b.scores).map(([k,v])=>`
            <div class="score-item">
              <div class="score-name">${k}</div>
              <div class="score-dots">${dots(v)}</div>
              <div class="score-num">${v}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
    <div class="card-footer">
      <span class="publish-date">📅 ${b.publishDate}</span>
      <a class="link-article" href="${b.articleUrl}" target="_blank">記事を見る →</a>
    </div>
  </div>`;
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const area = document.getElementById('areaFilter').value;
  const struct = document.getElementById('structFilter').value;
  const sort = document.getElementById('sortSelect').value;
  const pub = document.getElementById('publishFilter').value;

  let filtered = buildings.filter(b =>
    (!q || b.name.toLowerCase().includes(q) || b.area1.includes(q) || b.area2.includes(q) || b.description.includes(q)) &&
    (!area || b.area1 === area) &&
    (!struct || b.structure === struct) &&
    (!pub || b.publishDate.startsWith(pub))
  );

  if (sort === 'floor-desc') filtered.sort((a,b)=>floorNum(b)-floorNum(a));
  else if (sort === 'floors-desc') filtered.sort((a,b)=>b.floors-a.floors);
  else if (sort === 'completion-desc') filtered.sort((a,b)=>parseYear(b)-parseYear(a));
  else if (sort === 'score-desc') filtered.sort((a,b)=>scoreTotal(b)-scoreTotal(a));

  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');
  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    grid.innerHTML = filtered.map(makeCard).join('');
  }
  document.getElementById('resultCount').textContent = `表示中：${filtered.length} / ${buildings.length}棟`;
  document.getElementById('totalBadge').textContent = buildings.length + '棟掲載中';
  updateCompareBtn();
}

function toggleSelect(id, cb) {
  if (cb.checked) {
    if (selected.size >= 4) { cb.checked = false; alert('比較は最大4棟まで選択できます'); return; }
    selected.add(id);
    document.getElementById(`card-${id}`)?.classList.add('selected');
  } else {
    selected.delete(id);
    document.getElementById(`card-${id}`)?.classList.remove('selected');
  }
  updateCompareBtn();
}

function updateCompareBtn() {
  document.getElementById('selectedCount').textContent = selected.size;
  document.getElementById('compareBtn').disabled = selected.size < 2;
}

function openCompare() {
  if (selected.size < 2) return;
  const sel = buildings.filter(b => selected.has(b.id));
  const rows = [
    ['エリア', b => `${b.area1}・${b.area2}`],
    ['所在地', b => b.address],
    ['最寄駅', b => b.station],
    ['階数', b => `${b.floors}階`],
    ['基準階', b => b.standardFloor],
    ['構造', b => `<span class="struct-badge struct-${b.structure}">${b.structure}</span>`],
    ['竣工', b => b.completion],
    ['アクセス', b => `${'★'.repeat(b.scores['アクセス'])}${'☆'.repeat(5-b.scores['アクセス'])} (${b.scores['アクセス']})`],
    ['スペック', b => `${'★'.repeat(b.scores['スペック'])}${'☆'.repeat(5-b.scores['スペック'])} (${b.scores['スペック']})`],
    ['BCP', b => `${'★'.repeat(b.scores['BCP'])}${'☆'.repeat(5-b.scores['BCP'])} (${b.scores['BCP']})`],
    ['環境性能', b => `${'★'.repeat(b.scores['環境性能'])}${'☆'.repeat(5-b.scores['環境性能'])} (${b.scores['環境性能']})`],
    ['Naviスコア合計', b => `<strong>${scoreTotal(b)} / 20点</strong>`],
    ['反映年月日', b => b.publishDate],
    ['特徴', b => b.tags.map(t=>`<span class="tag">${t}</span>`).join(' ')],
    ['記事', b => `<a href="${b.articleUrl}" target="_blank" style="color:var(--accent2)">記事を見る →</a>`],
  ];

  let tableHtml = `<tr><th style="background:rgba(15,23,42,0.9)">項目</th>${sel.map(b=>`<th>${b.name}</th>`).join('')}</tr>`;
  rows.forEach(([label, fn]) => {
    tableHtml += `<tr><td>${label}</td>${sel.map(b=>`<td>${fn(b)}</td>`).join('')}</tr>`;
  });

  document.getElementById('compareTable').innerHTML = tableHtml;
  document.getElementById('compareModal').classList.add('active');
}

function closeCompare() {
  document.getElementById('compareModal').classList.remove('active');
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('areaFilter').value = '';
  document.getElementById('structFilter').value = '';
  document.getElementById('sortSelect').value = 'default';
  document.getElementById('publishFilter').value = '';
  selected.clear();
  updateCompareBtn();
  render();
}

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('areaFilter').addEventListener('change', render);
document.getElementById('structFilter').addEventListener('change', render);
document.getElementById('sortSelect').addEventListener('change', render);
document.getElementById('publishFilter').addEventListener('change', render);
document.getElementById('compareModal').addEventListener('click', e => {
  if (e.target === document.getElementById('compareModal')) closeCompare();
});

render();
</script>
</body>
</html>
